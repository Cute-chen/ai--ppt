<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="tri-outer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="tri-inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer triangle -->
  <polygon points="24,3 45,42 3,42" fill="url(#tri-outer)" filter="url(#glow)" opacity="0.95"/>
  <!-- Inner dark triangle -->
  <polygon points="24,14 38,38 10,38" fill="url(#tri-inner)" opacity="0.85"/>
  <!-- Highlight slash -->
  <line x1="14" y1="36" x2="28" y2="18" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Top sparkle -->
  <circle cx="24" cy="4" r="2" fill="white" opacity="0.95"/>
</svg>
